  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0a0a0a;
      --bg-card:       #111111;
      --border:        #222222;
      --border-mid:    #2e2e2e;
      --text:          #f0f0f0;
      --text-secondary:#cccccc;
      --muted:         #888888;
      --orange:        #ff6600;
      --orange-light:  #ff7a1a;
      --mono:          "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      --sans:          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --r:             6px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-size: 16px;
      line-height: 1.7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }

    .checkmark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--orange);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .checkmark svg { stroke: var(--bg); }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    h1 em {
      font-style: normal;
      color: var(--orange);
    }

    .sub {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-bottom: 0.75rem;
      line-height: 1.7;
    }

    .note {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--mono);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 0.9rem 1.8rem;
      border-radius: var(--r);
      text-decoration: none;
      border: 1px solid var(--border-mid);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .btn-home:hover {
      border-color: #404040;
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>You're <em>booked.</em></h1>
    <p class="sub">Your discovery call is confirmed. We'll walk through where you are, where you want to go, and exactly how to get there.</p>
    <p class="note">Check your email for the calendar invite and meeting details.</p>
    <a href="/" class="btn-home">&larr; Back to thecadenceframework.com</a>
  </div>
</body>
</html>
