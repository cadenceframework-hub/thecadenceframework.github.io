<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0a"/>

  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222222" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#grid)"/>
  <rect width="400" height="400" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Orange accent bar -->
  <rect x="180" y="130" width="40" height="3" fill="#ff6600" rx="1.5"/>

  <!-- Logo text: "CF" monogram -->
  <text
    x="200"
    y="210"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="90"
    font-weight="700"
    text-anchor="middle"
    fill="#f0f0f0"
    letter-spacing="-4">CF</text>

  <!-- Tagline -->
  <text
    x="200"
    y="258"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    font-weight="400"
    text-anchor="middle"
    fill="#5a5a5a"
    letter-spacing="4">THE CADENCE FRAMEWORK</text>

  <!-- Bottom accent dot -->
  <circle cx="200" cy="290" r="3" fill="#ff6600" opacity="0.7"/>
</svg>
