<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Grid overlay -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#161616" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Inner frame -->
  <rect x="60" y="60" width="1080" height="510" fill="none" stroke="#1a1a1a" stroke-width="1" rx="4"/>

  <!-- Left orange accent bar -->
  <rect x="60" y="60" width="3" height="510" fill="#ff6600" opacity="0.45"/>

  <!-- Badge -->
  <rect x="110" y="118" width="238" height="28" rx="14" fill="#111" stroke="#252525" stroke-width="1"/>
  <circle cx="132" cy="132" r="5" fill="#ff6600"/>
  <text x="147" y="137" font-family="'Courier New', Courier, monospace" font-size="11" fill="#4a4a4a" letter-spacing="2.5">NOW TAKING CLIENTS</text>

  <!-- THE — small muted -->
  <text
    x="110"
    y="230"
    font-family="'Courier New', Courier, monospace"
    font-size="18"
    fill="#3a3a3a"
    letter-spacing="8">THE</text>

  <!-- CADENCE — orange, large -->
  <text
    x="110"
    y="340"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="130"
    font-weight="700"
    fill="#ff6600"
    letter-spacing="-4">CADENCE</text>

  <!-- FRAMEWORK — white, medium -->
  <text
    x="112"
    y="415"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="70"
    font-weight="400"
    fill="#f0f0f0"
    letter-spacing="6">FRAMEWORK</text>

  <!-- Divider line -->
  <rect x="110" y="448" width="80" height="2" fill="#ff6600" rx="1" opacity="0.5"/>

  <!-- Tagline -->
  <text
    x="110"
    y="498"
    font-family="'Courier New', Courier, monospace"
    font-size="16"
    fill="#4a4a4a"
    letter-spacing="3">Find the rhythm. Build the system.</text>

  <!-- Right — URL -->
  <text
    x="1090"
    y="555"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#2a2a2a"
    text-anchor="end"
    letter-spacing="2">THECADENCEFRAMEWORK.COM</text>
</svg>
